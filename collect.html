<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Collect Herb Data 🌿</title>

  <link rel="stylesheet" href="/static/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="/static/js/main.js" defer></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #0c2d1a, #020805);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eaffea;
    }

    .container {
      width: 100%;
      max-width: 700px;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #b6ffcf;
    }

    .card {
      background: #0a1a12;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0,255,150,0.15);
      border: 1px solid rgba(0,255,150,0.15);
    }

    input#herb {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      background: #06120c;
      color: #eaffea;
      outline: none;
    }

    label {
      color: #c8ffd8;
      font-weight: 500;
      margin-right: 15px;
    }

    .sensor-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #07140e;
      padding: 14px 16px;
      border-radius: 12px;
      margin: 14px 0;
      border: 1px solid rgba(0,255,150,0.12);
    }

    .sensor-box button {
      padding: 6px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(135deg, #00ff9d, #00c47a);
      color: #00331f;
      transition: all 0.25s ease;
      box-shadow: 0 0 10px rgba(0,255,150,0.4);
    }

    .sensor-box button:hover {
      transform: scale(1.07);
      box-shadow: 0 0 18px rgba(0,255,150,0.7);
    }

    .status-ok {
      color: #00ff80;
      font-weight: 600;
    }

    .status-fail {
      color: #ff6b6b;
      font-weight: 600;
    }

    #finishBtn {
      padding: 12px 24px;
      border-radius: 14px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #7dffb2, #00ff9d);
      color: #00331f;
      margin-right: 15px;
      box-shadow: 0 0 18px rgba(0,255,150,0.5);
    }

    #finishBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    #clearCollect {
      padding: 12px 22px;
      border-radius: 14px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: #ff5c5c;
      color: white;
      box-shadow: 0 0 15px rgba(255,90,90,0.6);
    }

    button.back {
      margin-top: 25px;
      padding: 10px 22px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      background: #00c47a;
      color: #002a18;
      font-weight: 600;
    }

    @media (max-width: 500px) {
      .sensor-box {
        flex-direction: column;
        align-items: flex-start;
      }

      .sensor-box button {
        margin-top: 8px;
      }
    }
  </style>
</head>

<body>
<div class="container">
  <h1>🧪 Herb Data Collection</h1>

  <div class="card">

    <input id="herb" placeholder="Enter Herb Name">

    <br><br>

    <label>
      <input type="radio" name="purity" value="Pure" checked> Pure
    </label>
    <label>
      <input type="radio" name="purity" value="Adulterated"> Adulterated
    </label>

    <div class="sensor-box">
      <span>pH Sensor</span>
      <button onclick="fetchSensor('ph')">Read</button>
      <span id="ph_status" class="status-fail">❌ Not collected</span>
    </div>

    <div class="sensor-box">
      <span>TDS Sensor</span>
      <button onclick="fetchSensor('tds')">Read</button>
      <span id="tds_status" class="status-fail">❌ Not collected</span>
    </div>

    <div class="sensor-box">
      <span>Optical Sensor</span>
      <button onclick="fetchSensor('optical')">Read</button>
      <span id="optical_status" class="status-fail">❌ Not collected</span>
    </div>

    <div style="text-align:center;margin-top:22px">
      <button id="finishBtn" onclick="finishCollect()" disabled>
        Finish & Save
      </button>

      <!-- ✅ FIXED CLEAR BUTTON -->
      <button id="clearCollect" onclick="clearSensors()">
        🔄 Clear Values
      </button>
    </div>

    <br>

    <button class="back" onclick="history.back()">⬅ Back</button>

  </div>
</div>
</body>
</html>
