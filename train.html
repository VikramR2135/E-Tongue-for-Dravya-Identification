<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🧠 Model Training Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #1b2a1f, #0b0f0d);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e6f7ec;
    }

    .container {
      width: 100%;
      max-width: 700px;
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #b6ffcc;
      margin-bottom: 25px;
      text-shadow: 0 0 15px rgba(0,255,120,0.3);
    }

    .card {
      background: rgba(20, 30, 25, 0.85);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      border: 1px solid rgba(0,255,120,0.15);
    }

    h2 {
      color: #9cffbf;
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      color: #cceedd;
      text-align: center;
      line-height: 1.6;
      font-size: 1rem;
    }

    .sensor-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.06);
      padding: 14px 18px;
      border-radius: 14px;
      margin: 20px 0;
      border: 1px solid rgba(0,255,120,0.1);
    }

    .status-ok {
      color: #00ff90;
      font-weight: 600;
    }

    .status-fail {
      color: #ff6b6b;
      font-weight: 600;
    }

    #trainBtn {
      padding: 14px 30px;
      border-radius: 14px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #00ff9c, #00c97b);
      color: #062016;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(0,255,150,0.35);
    }

    #trainBtn:hover {
      transform: scale(1.07);
      box-shadow: 0 12px 35px rgba(0,255,150,0.6);
    }

    #trainBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #loader p {
      color: #9cffbf;
      font-weight: 600;
    }

    button.back {
      margin-top: 30px;
      padding: 12px 26px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #02151f;
      font-weight: 600;
      display: block;
      margin-left: auto;
      margin-right: auto;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(0,180,255,0.35);
    }

    button.back:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 35px rgba(0,180,255,0.6);
    }
  </style>
</head>

<body>
<div class="container">
  <h1>🧠 Model Training Center</h1>

  <div class="card">

    <h2>What happens here?</h2>
    <p>
      • Uses all collected herb data<br>
      • Trains ML model using pH, TDS & Optical<br>
      • Old model will be replaced<br>
      • New model will be used for prediction
    </p>

    <div id="statusBox" class="sensor-box">
      <span>Model Status</span>
      <span id="statusText" class="status-fail">❌ Model not trained</span>
    </div>

    <div style="text-align:center; margin-top:25px;">
      <button id="trainBtn" onclick="trainModel()">🚀 Make / Update Model</button>
    </div>

    <div id="loader" style="display:none; text-align:center; margin-top:20px;">
      <p>Training model... please wait ⏳</p>
    </div>

    <button class="back" onclick="history.back()">⬅ Back</button>
  </div>
</div>

<script>
function trainModel() {
  document.getElementById("loader").style.display = "block";
  document.getElementById("trainBtn").disabled = true;

  fetch("/make_model", { method: "POST" })
    .then(res => res.json())
    .then(data => {
      document.getElementById("loader").style.display = "none";
      document.getElementById("statusText").innerHTML = "✔ Model trained successfully";
      document.getElementById("statusText").className = "status-ok";
      document.getElementById("trainBtn").disabled = false;
    })
    .catch(() => {
      document.getElementById("loader").style.display = "none";
      document.getElementById("statusText").innerHTML = "❌ Training failed";
      document.getElementById("statusText").className = "status-fail";
      document.getElementById("trainBtn").disabled = false;
    });
}
</script>
</body>
</html>
